<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reference Search</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #fff; color: #000; font-size: 13px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    #tabs { display: flex; border-bottom: 2px solid #000; flex-shrink: 0; }
    .tab { flex: 1; padding: 8px 2px; text-align: center; font-size: 11px; font-weight: bold; cursor: pointer; background: #f0f0f0; border: none; font-family: inherit; letter-spacing: 0.04em; text-transform: uppercase; border-right: 1px solid #000; }
    .tab:last-child { border-right: none; }
    .tab.active { background: #000; color: #fff; }
    .tab:hover:not(.active) { background: #ddd; }
    #search-bar { padding: 8px 10px; border-bottom: 1px solid #ccc; display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
    #search-input { flex: 1; border: 1px solid #000; padding: 6px 10px; font-size: 14px; font-family: inherit; background: #fff; color: #000; outline: none; }
    #search-input:focus { border-width: 2px; }
    #clear-btn { background: none; border: 1px solid #000; cursor: pointer; font-size: 14px; padding: 5px 10px; font-family: inherit; color: #000; line-height: 1; }
    #clear-btn:hover { background: #000; color: #fff; }
    #results-area { flex: 1; overflow-y: auto; padding: 8px 10px; }
    #hint { color: #666; padding: 20px 0; text-align: center; font-size: 13px; }
    #no-results { color: #666; padding: 20px 0; text-align: center; font-size: 13px; display: none; }
    #match-count { font-size: 11px; color: #666; padding: 2px 0 6px 0; }
    .result-card { border: 1px solid #000; margin-bottom: 8px; position: relative; }
    .result-header { background: #000; color: #fff; padding: 6px 30px 6px 10px; display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
    .result-name { font-weight: bold; font-size: 14px; }
    .result-sub { font-size: 11px; opacity: 0.75; white-space: nowrap; }
    .close-btn { position: absolute; top: 4px; right: 6px; background: none; border: none; color: #fff; font-size: 16px; cursor: pointer; line-height: 1; padding: 2px 4px; font-family: inherit; }
    .close-btn:hover { opacity: 0.65; }
    .result-body { padding: 8px 10px; }
    .result-row { display: grid; grid-template-columns: 80px 1fr; gap: 3px 8px; margin-bottom: 4px; line-height: 1.4; }
    .result-label { font-weight: bold; font-size: 11px; text-transform: uppercase; letter-spacing: 0.03em; color: #444; padding-top: 1px; }
    .result-value { font-size: 13px; }
    .result-notes { margin-top: 6px; padding-top: 6px; border-top: 1px dashed #ccc; font-size: 11px; color: #555; font-style: italic; }

    .result-summary { font-size: 13px; font-style: italic; color: #333; margin-bottom: 6px; line-height: 1.4; }
    .result-detail { font-size: 12px; line-height: 1.5; white-space: pre-wrap; border-top: 1px dashed #ccc; padding-top: 6px; margin-top: 4px; }
    .result-category { font-size: 11px; opacity: 0.75; }
  </style>
</head>
<body>
<div id="tabs">
  <button class="tab active" data-tab="techniques">Techniques</button>

</div>
<div id="search-bar">

</div>
<div id="results-area">

  <div id="match-count"></div>
  <div id="results-list"></div>
</div>

const COMBAT_RULES=[
  {title:"D20 Test (Core Mechanic)",category:"Core Rules",summary:"Roll d20, add relevant modifier, compare to target DC or Defense.",detail:"1. Roll a d20.\n2. Add the relevant modifier (skill, attack power, save bonus, etc.).\n3. Compare the total to a target number (DC for checks/saves, Defense for attacks).\n4. If the total is equal to or greater than the target number, the attempt succeeds.\n\nAlways round down when dividing or multiplying numbers."},
  {title:"Difficulty Classes (DC)",category:"Core Rules",summary:"Very Easy 5 / Easy 10 / Moderate 15 / Hard 20 / Very Hard 25 / Nearly Impossible 30.",detail:"Very Easy: DC 5\nEasy: DC 10\nModerate: DC 15\nHard: DC 20\nVery Hard: DC 25\nNearly Impossible: DC 30"},
  {title:"Advantage & Disadvantage",category:"Core Rules",summary:"Roll two d20s. Take the higher (advantage) or lower (disadvantage). Multiple sources don't stack. They cancel each other out.",detail:"Advantage: Roll two d20s, take the higher result.\nDisadvantage: Roll two d20s, take the lower result.\n\nThey Don't Stack: Multiple sources of advantage or disadvantage still only result in rolling two d20s.\nThey Cancel Out: If a roll has both advantage AND disadvantage from any sources, they cancel — roll one d20 as normal."},
  {title:"Initiative",category:"Combat — Order",summary:"Roll d20 + Agility at the start of combat. Highest goes first. Order stays fixed each round.",detail:"At the start of combat, every participant rolls initiative: d20 + their Agility modifier.\nThe GM rolls once for each group of enemies.\nInitiative order is ranked from highest to lowest and remains the same each round.\n\nTies: Players decide among tied characters. GM decides among tied monsters. GM decides ties between a character and a monster.\n\nSurprise: A surprised creature can't move or take actions on its FIRST turn, and can't take reactions until that turn ends."},
  {title:"Taking Your Turn",category:"Combat — Order",summary:"On your turn: move up to your speed AND take one action. You choose the order.",detail:"On your turn you can:\n• Move up to your speed\n• Take one action\n• Take one special action (if available)\n• Take one reaction (when triggered)\n• Communicate briefly (free — short statement or gesture)\n• Interact with one object for free (during your move or action)\n\nYou can break up your movement before and after your action.\nInteracting with a second object requires an action.\nYou can forgo moving, acting, or both."},
  {title:"Action: Attack",category:"Combat — Actions",summary:"Attack with a weapon or unarmed strike. Roll d20 + Attack Power vs target's Defense.",detail:"Choose a target within range. Roll d20 + Attack Power vs the target's Defense (Def).\nOn a hit, roll damage and add modifiers.\n\nCritical Hit (natural 20): Hits regardless of Defense. Roll damage dice twice, then add modifiers.\nAutomatic Miss (natural 1): Misses regardless of modifiers or target's Defense."},
  {title:"Action: Cast",category:"Combat — Actions",summary:"Cast a technique using TP. Use your Tech Attack Power for attack rolls and Tech Save DC for saving throw difficulty.",detail:"Most techniques require an action to cast and cost TP.\nSome techniques have no TP cost but still require an action.\nRange types: Distance (in feet), Touch (within reach), Self (targets you or emanates from you).\nDuration types: Instant, Length of Time, or Concentration.\n\nTargeting yourself: Allowed unless otherwise specified.\nInvalid targets: Nothing happens to the target but TP is still spent.\nTech attack power and tech save DC are listed on your character sheet."},
  {title:"Action: Dash",category:"Combat — Actions",summary:"Gain extra movement equal to your speed for this turn.",detail:"When you Dash, you gain additional movement equal to your speed for the current turn, after applying any modifiers (such as difficult terrain).\nThis effectively doubles your movement for the turn."},
  {title:"Action: Disengage",category:"Combat — Actions",summary:"Your movement doesn't provoke opportunity attacks for the rest of this turn.",detail:"When you Disengage, your movement does not provoke opportunity attacks for the rest of your current turn.\nThis allows you to safely move out of melee range without being struck."},
  {title:"Action: Dodge",category:"Combat — Actions",summary:"Until your next turn: attacks against you have disadvantage (if you can see the attacker), and you have advantage on Dex saves.",detail:"Until the start of your next turn:\n• Attack rolls made against you have disadvantage (provided you can see the attacker)\n• You make Dexterity saving throws with advantage\n\nYou lose these benefits if you become incapacitated or if your speed drops to 0."},
  {title:"Action: Help",category:"Combat — Actions",summary:"Aid an ally's check (they get advantage) OR distract an enemy within 5ft (next ally attack has advantage).",detail:"Assist with a Check: An ally gains advantage on the next check to perform the task you're helping with, as long as they make the check before the start of your next turn.\n\nAssist with an Attack Roll: You distract an enemy within 5 feet of you, granting advantage on the next attack roll one of your allies makes against that enemy before the start of your next turn."},
  {title:"Action: Hide",category:"Combat — Actions",summary:"Make a Stealth check. The result is the DC for enemies trying to find you. You must be out of sight to hide.",detail:"Make a Stealth check. The result becomes the DC for Perception checks made to locate you.\nYou can hide only if no one can currently see you.\nYou are discovered if you make significant noise, make an attack, or are otherwise revealed.\n\nPassive Perception: The GM compares your Stealth check result to the passive Perception of nearby creatures. If a creature's passive Perception equals or exceeds your result, it spots you."},
  {title:"Action: Ready",category:"Combat — Actions",summary:"Define a trigger and a response. Use your reaction to act when the trigger occurs before your next turn.",detail:"On your turn, choose:\n1. A trigger (circumstance that will prompt your response)\n2. A response (an action or movement up to your speed)\n\nWhen the trigger occurs before the start of your next turn, you can take your reaction to execute your response, or ignore the trigger.\n\nReadying a Technique: You cast it normally (spending TP) but hold the energy, released via your reaction when triggered. Requires Concentration until released. If Concentration is broken, the technique fails with no effect."},
  {title:"Action: Search",category:"Combat — Actions",summary:"Search an area, object, or person. GM sets an appropriate check and DC.",detail:"You devote your attention to finding something. The GM may require a check (typically Perception or Investigation) against a DC they determine.\nYou must be searching in the general vicinity of what you're looking for — even a successful check won't reveal something outside your search area."},
  {title:"Action: Use",category:"Combat — Actions",summary:"Use a special item or interact with more than one object in a turn.",detail:"Use an item that specifies it requires an action.\nThis action is also used when you want to interact with more than one object on your turn — the first interaction is free, any additional interactions cost an action."},
  {title:"Reactions",category:"Combat — Actions",summary:"An instant response to a trigger. One per round. Regenerates at the start of your next turn.",detail:"A reaction is an instant response to a trigger, which can occur on your turn or someone else's.\nYou can take only one reaction per round. You can't take another until the start of your next turn.\nIf your reaction interrupts another creature's turn, that creature continues its turn right after the reaction resolves.\nA reaction takes place immediately after its trigger unless the reaction's description says otherwise.\n\nMost common reactions: Opportunity Attack, Ready action response, and specific class/feature reactions."},
  {title:"Special Actions (Bonus Actions)",category:"Combat — Actions",summary:"An additional action granted by a specific feature or technique. Only one per turn.",detail:"Some features and techniques allow you to take a special action on your turn.\nYou can only take a special action when a feature or technique specifically grants one.\nYou can take only ONE special action per turn — choose which to use if multiple are available.\nYou either have a special action available or you don't."},
  {title:"Opportunity Attack",category:"Combat — Movement",summary:"When an enemy you can see leaves your reach, use your reaction to make one melee attack.",detail:"Trigger: A creature you can see leaves your reach.\nResponse: Use your reaction to make one melee attack against it. The attack occurs right before it leaves your reach.\n\nAvoiding: Take the Disengage action to move without provoking opportunity attacks.\nNo opportunity attack when: You teleport, or you are moved without using your movement/action/special action/reaction (e.g. pushed by an explosion)."},
  {title:"Movement Rules",category:"Combat — Movement",summary:"Move up to your speed. Split movement before/after action. Difficult terrain costs double movement.",detail:"You can move any amount up to your speed on your turn.\nMovement can be split: move, take your action, then move the remainder.\nDifficult Terrain: Every foot of movement costs 2 feet of speed.\nClimbing, Crawling, Swimming: Move at half speed (unless a separate speed is listed).\n\nMoving Through Creatures:\n• You CAN move through an ally's space.\n• You CANNOT move through a hostile creature's space.\n• You CANNOT end your move in another creature's space (ally or enemy)."},
  {title:"Dropping Prone",category:"Combat — Movement",summary:"Drop prone for free on your turn. Standing up costs movement equal to half your speed.",detail:"Dropping prone on your turn requires no action or movement.\nStanding up costs movement equal to half your speed.\nYou can't stand up if your speed is 0 or if you have insufficient movement remaining.\nWhile prone, you can only crawl (half speed).\n\nSee Condition: Prone for full combat effects."},
  {title:"Jumping",category:"Combat — Movement",summary:"Jump distance is based on your Strength modifier. Each foot jumped costs 1 foot of movement.",detail:"High Jump: With a 10ft running start, leap upward a number of feet equal to 3 + your Strength modifier. Halved for a standing high jump.\n\nLong Jump: With a 10ft running start, jump a number of feet equal to 12 + your Strength modifier. Halved for a standing long jump. GM may require an Athletics check if height is a factor.\n\nLanding in Difficult Terrain: After a long jump, succeed on a DC 10 Athletics check or fall prone.\nEach foot jumped costs 1 foot of your movement."},
  {title:"Cover",category:"Combat — Attacking",summary:"Half Cover: +2 Def and Dex saves. Three-Quarters Cover: +5 Def and Dex saves. Total Cover: Can't be targeted.",detail:"Only the most protective degree of cover applies (they don't add together).\nCover only applies when the attack originates on the opposite side of the cover.\n\nHalf Cover (+2 Def and Dex saves): Another creature, or an object covering at least half the target.\nThree-Quarters Cover (+5 Def and Dex saves): An object covering at least three-quarters of the target.\nTotal Cover (can't be targeted directly): An object covering the whole target."},
  {title:"Ranged Attacks",category:"Combat — Attacking",summary:"Must have line of sight. Disadvantage if within 5ft of a hostile. Can't attack beyond specified range.",detail:"You can only make ranged attacks against targets within the specified range.\nYou must be able to see the target.\nYou can't attack targets beyond the weapon's range.\n\nRanged in Close Combat: Disadvantage on ranged attack rolls if you are within 5 feet of an enemy who can see you and isn't incapacitated.\n\nVariant Long-Range Weapons: Some weapons can be used up to three times their normal range, but with disadvantage."},
  {title:"Melee Attacks",category:"Combat — Attacking",summary:"Default reach is 5ft. Some creatures or weapons have greater reach.",detail:"Standard melee reach is 5 feet. Creatures or weapons with greater reach note it in their description.\n\nUnarmed Strike: Choose one effect:\n• Damage: Attack roll (d20 + Strength modifier + attack bonus). On hit: 1 + Strength modifier physical damage.\n• Grapple: Target makes Strength or Dexterity save (DC = 8 + your Strength modifier + Save Bonus) or is grappled. Only works if target is no more than one size larger and you have a free hand.\n• Shove: Target makes Strength or Dexterity save (same DC) or is pushed 5ft away OR knocked prone. Only works if target is no more than one size larger."},
  {title:"Unseen Attackers & Targets",category:"Combat — Attacking",summary:"Attacking a target you can't see: disadvantage. Attacking while hidden: advantage. Revealing yourself when you attack.",detail:"Attacking a target you can't see: Disadvantage on the attack roll. If the target isn't where you think it is, you miss.\nAttacking a creature that can't see you: Advantage on the attack roll.\nAttacking while hidden: You give away your location when the attack hits or misses."},
  {title:"Critical Hit & Automatic Miss",category:"Combat — Attacking",summary:"Natural 20: Critical hit — roll damage dice twice. Natural 1: Automatic miss.",detail:"Natural 20 (Critical Hit): The attack hits regardless of the target's Defense. Roll all damage dice twice, then add modifiers as normal.\n\nNatural 1 (Automatic Miss): The attack misses regardless of any modifiers or the target's Defense."},
  {title:"Damage Types",category:"Combat — Damage",summary:"Physical, Acid, Cold, Fire, Force, Lightning, Necrotic, Poison, Psychic, Radiant, Spirit.",detail:"Physical: Most common — impact or slashing from weapons.\nAcid: Corrosive liquids or digestive fluids.\nCold: Icy blasts or freezing water.\nFire: Scorching flames and heat.\nForce: Magical energy or concussive force.\nLightning: Electricity.\nNecrotic: Life-destroying energy.\nPoison: Toxic substances, venom.\nPsychic: Mind-rending energy.\nRadiant: Energy weapons or searing radiation.\nSpirit: Holy or spiritual energy."},
  {title:"Resistance & Vulnerability",category:"Combat — Damage",summary:"Resistance: halve damage (round down). Vulnerability: take an extra 1d6 per damage die rolled of that type (can't be healed).",detail:"Resistance: Damage of that type is halved (round down).\nVulnerability: The creature takes an additional 1d6 damage for each damage die rolled of that type. This extra damage cannot be healed with techniques or healing items.\n\nNote: These are applied per damage type — a creature can be resistant to one type and vulnerable to another."},
  {title:"Hit Points (HP)",category:"Combat — Damage",summary:"Subtract damage from current HP. HP loss has no mechanical effect until you reach 0.",detail:"HP represents durability and will to survive. Maximum HP is your unhurt total.\nSubtract damage from current HP. HP loss has no game effect until you reach 0.\nCurrent HP can't go below 0.\nHealing can't exceed your max HP — excess is lost.\n\nTemporary HP: A buffer that takes damage first. Lost before regular HP. Doesn't stack — choose to keep old or new. Lost after a long rest. Can't be restored by healing."},
  {title:"Dropping to 0 HP",category:"Combat — Damage",summary:"Fall unconscious and begin making death saving throws. Three successes: stable. Three failures: dead.",detail:"When you drop to 0 HP you fall unconscious and must make death saving throws each turn.\n\nDeath Saving Throw: Roll d20. 10 or higher = success. Below 10 = failure.\nThree successes: You become stable.\nThree failures: You die.\nSuccesses and failures don't need to be consecutive. Both reset when you regain any HP or become stable.\n\nNatural 1: Counts as two failures.\nNatural 20: You regain 1 HP.\nTaking damage at 0 HP: Suffer one death save failure. From a critical hit: two failures.\n\nStabilizing: Another creature can take the Help action and succeed on a DC 10 Medicine check to stabilize you.\nStable but unconscious: No more death saves, but still at 0 HP. Regain 1 HP after 1 hour if not healed."},
  {title:"Fate Points",category:"Core Rules",summary:"Spend to roll a bonus die on any d20 roll, gain advantage, or survive a death save failure. Refresh on long rest.",detail:"Starting Fate Points: 3 at level 1. Increases at levels 5 (4 pts), 11 (5 pts), 17 (6 pts).\nBonus Die Size: d6 at levels 1-4, d8 at 5-10, d10 at 11-16, d12 at 17+.\nRefresh: After a long rest (or each session / between adventures at GM's discretion).\n\nSpend 1 Fate Point:\n• Roll a bonus die and add to any attack roll, check, or saving throw (after rolling d20, before GM narrates).\n• Only 1 fate point per d20 roll in this way.\n\nSpend 2 Fate Points:\n• Gain advantage on a single attack roll, check, or saving throw (can't combine with bonus die).\n\nExtra Recovery (Short Rest):\n• Spend 1 fate point to roll a bonus die and add to recovered HP or TP.\n\nStaving Off Death:\n• Spend 1 fate point to turn a death save failure into a success. Only once while dying."},
  {title:"Short Rest",category:"Resting",summary:"1 hour of light activity. Spend Hit Dice to regain HP. Recharges some features.",detail:"Duration: 1 hour of nothing more strenuous than eating, reading, or tending to wounds.\n\nBenefits:\n• Spend one or more Hit Dice: Roll each die and add your Constitution modifier to determine HP regained.\n• Some special features recharge on a short rest.\n\nInterruptions (both rests): Rolling initiative, taking damage, casting techniques above Prime rank, or significant physical exertion (5 minutes for short rest) interrupts the rest. An interrupted short rest provides NO benefits."},
  {title:"Long Rest",category:"Resting",summary:"8 hours. Fully recover HP and Hit Dice. Remove 1 exhaustion level. Recharges all features. Min 16 hours between long rests.",detail:"Duration: 8 hours (6 hours sleep + 2 hours light activity).\nMinimum 16 hours must pass before you can benefit from another long rest.\n\nBenefits:\n• Full HP Recovery: Regain all lost HP and all spent Hit Dice.\n• Detrimental Effects: HP or ability reductions from monsters/techniques return to normal.\n• Exhaustion: Remove 1 level of exhaustion.\n• Special Features: Some features recharge on a long rest.\n\nInterruptions: Rolling initiative, taking damage, casting above Prime rank, or walking/physical exertion for 1 hour interrupts the rest.\n• If at least 1 hour was completed: gain benefits of a short rest.\n• Can resume a long rest, but requires 1 extra hour per interruption to complete."},
  {title:"Condition: Blinded",category:"Conditions",summary:"Can't see. Auto-fail checks requiring sight. Attackers have advantage vs you. Your attacks have disadvantage.",detail:"• Can't see and automatically fail any check that requires sight.\n• Attack rolls against you have advantage.\n• Your attack rolls have disadvantage."},
  {title:"Condition: Charmed",category:"Conditions",summary:"Can't attack the charmer. Charmer has advantage on social checks against you.",detail:"• Can't attack the charmer or target them with damaging abilities or effects.\n• The charmer has advantage on any check to interact with you socially."},
  {title:"Condition: Deafened",category:"Conditions",summary:"Can't hear. Auto-fail checks requiring hearing.",detail:"• Can't hear and automatically fail any check that requires hearing."},
  {title:"Condition: Frightened",category:"Conditions",summary:"Disadvantage on attacks and checks while source is in line of sight. Can't willingly move closer to source.",detail:"• Disadvantage on attack rolls and checks while the source of fear is within your line of sight.\n• Can't willingly move closer to the source of fear."},
  {title:"Condition: Grappled",category:"Conditions",summary:"Speed becomes 0. Disadvantage on attacks against non-grappler. Grappler can drag you (costs extra movement).",detail:"• Your speed becomes 0 and can't increase.\n• You have disadvantage on attack rolls against any target other than the grappler.\n• The grappler can drag or carry you when it moves, but every foot of movement costs it 1 extra foot — unless you are Tiny or two or more sizes smaller."},
  {title:"Condition: Incapacitated",category:"Conditions",summary:"Can't take actions or reactions.",detail:"• Can't take actions or reactions.\n\nNote: Several other conditions (Paralyzed, Petrified, Stunned, Unconscious) include being incapacitated as part of their effects."},
  {title:"Condition: Invisible",category:"Conditions",summary:"Can't be seen normally. Your attacks have advantage. Attacks against you have disadvantage.",detail:"• Impossible to see without special senses or techniques.\n• For hiding purposes, considered heavily obscured.\n• Location can still be detected by noise or tracks.\n• Your attack rolls have advantage.\n• Attack rolls against you have disadvantage."},
  {title:"Condition: Paralyzed",category:"Conditions",summary:"Incapacitated, can't move. Auto-fail Str and Dex saves. Attacks vs you have advantage. Attacks within 5ft are auto-crits.",detail:"• Incapacitated (can't take actions or reactions) and can't move.\n• Automatically fail Strength and Dexterity saving throws.\n• Attack rolls against you have advantage.\n• Any attack that hits you is a critical hit if the attacker is within 5 feet."},
  {title:"Condition: Petrified",category:"Conditions",summary:"Transformed to stone. Incapacitated, can't move or speak. Resistance to all damage. Immune to poison and disease.",detail:"• Transformed into a solid inanimate substance (usually stone). Weight increases by 10x. Cease aging.\n• Incapacitated and can't move or speak.\n• Unaware of surroundings.\n• Auto-fail Strength and Dexterity saving throws.\n• Attack rolls against you have advantage.\n• Resistance to all damage.\n• Immune to poison and disease."},
  {title:"Condition: Poisoned",category:"Conditions",summary:"Disadvantage on attack rolls and checks.",detail:"• Disadvantage on attack rolls.\n• Disadvantage on ability checks."},
  {title:"Condition: Prone",category:"Conditions",summary:"Can only crawl. Disadvantage on attacks. Attackers within 5ft have advantage vs you; beyond 5ft have disadvantage.",detail:"• Only movement option is to crawl (half speed), unless you stand up and end the condition.\n• Standing up costs movement equal to half your speed.\n• Disadvantage on your attack rolls.\n• Attackers within 5 feet have advantage on rolls against you.\n• Attackers beyond 5 feet have disadvantage on rolls against you."},
  {title:"Condition: Restrained",category:"Conditions",summary:"Speed 0. Attacks vs you have advantage. Your attacks have disadvantage. Disadvantage on Dex saves.",detail:"• Speed becomes 0 and can't benefit from speed bonuses.\n• Attack rolls against you have advantage.\n• Your attack rolls have disadvantage.\n• Disadvantage on Dexterity saving throws."},
  {title:"Condition: Stunned",category:"Conditions",summary:"Incapacitated. Auto-fail Str and Dex saves. Attacks against you have advantage.",detail:"• Incapacitated (can't take actions or reactions).\n• Automatically fail Strength and Dexterity saving throws.\n• Attack rolls against you have advantage."},
  {title:"Condition: Unconscious",category:"Conditions",summary:"Incapacitated, can't move or speak, unaware of surroundings. Drop held items, fall prone. Auto-crits within 5ft.",detail:"• Incapacitated and can't move or speak.\n• Unaware of surroundings.\n• Drop whatever you are holding and fall prone.\n• Automatically fail Strength and Dexterity saving throws.\n• Attack rolls against you have advantage.\n• Any attack that hits you is a critical hit if the attacker is within 5 feet."},
  {title:"Condition: Exhaustion",category:"Conditions",summary:"Cumulative by level. Each level: attack rolls, checks, and saves suffer a penalty equal to 2x exhaustion level. Speed reduced by 5ft per level. 6 levels = death.",detail:"Exhaustion is a cumulative condition that increases by level (1 through 6).\n\nFor each level of exhaustion:\n• Attack rolls, checks, and saving throws suffer a penalty equal to two times your exhaustion level.\n  (e.g. Exhaustion 1 = -2 penalty. Exhaustion 3 = -6 penalty.)\n• Speed is reduced by 5 feet per level.\n  (e.g. Exhaustion 2 = -10ft speed.)\n\n6 levels of exhaustion = death.\n\nRecovery: A long rest removes 1 level of exhaustion. Certain techniques can also remove levels."},
  {title:"Creature Sizes",category:"Core Rules",summary:"Small/Medium: 5x5ft (1 square). Large: 10x10ft (4 squares). Huge: 15x15ft (9 squares). Gargantuan: 20x20ft (16 squares).",detail:"Small: 5 by 5 feet — 1 map square.\nMedium: 5 by 5 feet — 1 map square.\nLarge: 10 by 10 feet — 4 map squares (2x2).\nHuge: 15 by 15 feet — 9 map squares (3x3).\nGargantuan: 20 by 20 feet — 16 map squares (4x4).\n\nMost player characters are Small or Medium and occupy one 5-foot square."},
  {title:"Burning",category:"Environmental Hazards",summary:"1d4 fire damage at the start of each turn. Use an action to drop prone and roll to extinguish. Also extinguished by water or smothering.",detail:"A burning creature or object takes 1d4 fire damage at the start of each of its turns.\nTo extinguish: Use an action to drop prone and roll on the ground.\nFire also goes out if doused, submerged, or suffocated."},
  {title:"Falling",category:"Environmental Hazards",summary:"1d6 physical damage per 10ft fallen, maximum 20d6. Land prone unless damage is avoided.",detail:"At the end of a fall, take 1d6 physical damage for every 10 feet fallen, maximum 20d6.\nLand prone unless the creature avoids taking damage from the fall."},
  {title:"Suffocation",category:"Environmental Hazards",summary:"Hold breath for 1 + Con modifier minutes (min 30 seconds). Then gain 1 level of exhaustion each turn.",detail:"A creature can hold its breath for a number of minutes equal to 1 plus its Constitution modifier (minimum 30 seconds).\n\nWhen a creature runs out of breath or is choking, it gains 1 level of exhaustion at the end of each of its turns.\nWhen a creature can breathe again, all levels of exhaustion gained from suffocating are removed."},
];

let activeTab='techniques';
const tabs=document.querySelectorAll('.tab');
const input=document.getElementById('search-input');
const clearBtn=document.getElementById('clear-btn');
const resultsList=document.getElementById('results-list');
const hint=document.getElementById('hint');
const noResults=document.getElementById('no-results');
const matchCount=document.getElementById('match-count');

tabs.forEach(tab=>{
  tab.addEventListener('click',()=>{
    tabs.forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    activeTab=tab.dataset.tab;
    doSearch(input.value);
  });
});

function rankLabel(r){return r==='Prime'?'Prime (Rank 0)':`Rank ${r}`;}

function makeCard(headerLeft,headerRight,rows,notes){
  const card=document.createElement('div');
  card.className='result-card';
  const rowsHTML=rows.map(([l,v])=>`<div class="result-row"><span class="result-label">${l}</span><span class="result-value">${v}</span></div>`).join('');
  const notesHTML=notes?`<div class="result-notes">${notes}</div>`:'';
  card.innerHTML=`<div class="result-header"><span class="result-name">${headerLeft}</span><span class="result-sub">${headerRight}</span><button class="close-btn" title="Dismiss">✕</button></div><div class="result-body">${rowsHTML}${notesHTML}</div>`;
  card.querySelector('.close-btn').addEventListener('click',()=>card.remove());
  return card;
}

function renderTech(t){return makeCard(t.name,rankLabel(t.rank),[['Classes',t.classes],['Cast Time',t.castTime],['Range',t.range],['Effect',t.effect]],t.notes);}
function renderAbility(a){return makeCard(a.name,`${a.classPath} · Lv ${a.level}`,[['Cast Time',a.castTime],['Range',a.range],['Effect',a.effect]],a.notes);}

function renderRule(r){
  const card=document.createElement('div');
  card.className='result-card';
  card.innerHTML=`<div class="result-header"><span class="result-name">${r.title}</span><span class="result-category">${r.category}</span><button class="close-btn" title="Dismiss">✕</button></div><div class="result-body"><div class="result-summary">${r.summary}</div><div class="result-detail">${r.detail}</div></div>`;
  card.querySelector('.close-btn').addEventListener('click',()=>card.remove());
  return card;
}

function doSearch(query){
  const q=query.trim().toLowerCase();
  resultsList.innerHTML='';
  if(!q){hint.style.display='block';noResults.style.display='none';matchCount.textContent='';return;}
  hint.style.display='none';
  const dataset=activeTab==='techniques'?TECHNIQUES:activeTab==='abilities'?ABILITIES:COMBAT_RULES;
  const matches=dataset.filter(i=>(i.name||i.title||'').toLowerCase().includes(q)||(i.category||'').toLowerCase().includes(q));
  if(!matches.length){noResults.style.display='block';matchCount.textContent='';return;}
  noResults.style.display='none';
  matchCount.textContent=`${matches.length} result${matches.length!==1?'s':''}`;
  const render=activeTab==='techniques'?renderTech:activeTab==='abilities'?renderAbility:renderRule;
  matches.forEach(i=>resultsList.appendChild(render(i)));
}

let deb;
input.addEventListener('input',()=>{clearTimeout(deb);deb=setTimeout(()=>doSearch(input.value),180);});
clearBtn.addEventListener('click',()=>{input.value='';doSearch('');input.focus();});
input.focus();
</script>
</body>
</html>
