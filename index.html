<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Technique Search</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
      color: #000000;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #search-bar {
      padding: 10px 12px;
      border-bottom: 2px solid #000;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }

    #search-input {
      flex: 1;
      border: 1px solid #000;
      padding: 6px 10px;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
      color: #000;
      outline: none;
    }

    #search-input:focus {
      border-width: 2px;
    }

    #clear-btn {
      background: none;
      border: 1px solid #000;
      cursor: pointer;
      font-size: 14px;
      padding: 5px 10px;
      font-family: inherit;
      color: #000;
      line-height: 1;
    }

    #clear-btn:hover {
      background: #000;
      color: #fff;
    }

    #results-area {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
    }

    #hint {
      color: #666;
      padding: 20px 0;
      text-align: center;
      font-size: 13px;
    }

    #no-results {
      color: #666;
      padding: 20px 0;
      text-align: center;
      font-size: 13px;
      display: none;
    }

    .result-card {
      border: 1px solid #000;
      margin-bottom: 8px;
      position: relative;
    }

    .result-header {
      background: #000;
      color: #fff;
      padding: 6px 32px 6px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .result-name {
      font-weight: bold;
      font-size: 14px;
    }

    .result-rank {
      font-size: 11px;
      opacity: 0.8;
    }

    .close-btn {
      position: absolute;
      top: 4px;
      right: 6px;
      background: none;
      border: none;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      line-height: 1;
      padding: 2px 4px;
      font-family: inherit;
    }

    .close-btn:hover {
      opacity: 0.7;
    }

    .result-body {
      padding: 8px 10px;
    }

    .result-row {
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 4px 8px;
      margin-bottom: 4px;
      line-height: 1.4;
    }

    .result-row:last-child {
      margin-bottom: 0;
    }

    .result-label {
      font-weight: bold;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: #444;
      padding-top: 1px;
    }

    .result-value {
      font-size: 13px;
    }

    .result-notes {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px dashed #ccc;
      font-size: 11px;
      color: #555;
      font-style: italic;
    }

    #match-count {
      font-size: 11px;
      color: #666;
      padding: 4px 0 6px 0;
    }
  </style>
</head>
<body>

<div id="search-bar">
  <input id="search-input" type="text" placeholder="Search techniques…" autocomplete="off" />
  <button id="clear-btn" title="Clear">✕</button>
</div>

<div id="results-area">
  <div id="hint">Type a technique name to search</div>
  <div id="no-results">No techniques found</div>
  <div id="match-count"></div>

// ── Search logic ────────────────────────────────────────────────────────

const input = document.getElementById('search-input');
const clearBtn = document.getElementById('clear-btn');
const resultsList = document.getElementById('results-list');
const hint = document.getElementById('hint');
const noResults = document.getElementById('no-results');
const matchCount = document.getElementById('match-count');

function rankLabel(rank) {
  return rank === 'Prime' ? 'Prime (Rank 0)' : `Rank ${rank}`;
}

function renderCard(t) {
  const card = document.createElement('div');
  card.className = 'result-card';

  const header = document.createElement('div');
  header.className = 'result-header';
  header.innerHTML = `
    <span class="result-name">${t.name}</span>
    <span class="result-rank">${rankLabel(t.rank)}</span>
  `;

  const closeBtn = document.createElement('button');
  closeBtn.className = 'close-btn';
  closeBtn.innerHTML = '✕';
  closeBtn.title = 'Dismiss';
  closeBtn.addEventListener('click', () => card.remove());
  header.appendChild(closeBtn);

  const body = document.createElement('div');
  body.className = 'result-body';

  const rows = [
    ['Classes', t.classes],
    ['Cast Time', t.castTime],
    ['Range', t.range],
    ['Effect', t.effect],
  ];

  rows.forEach(([label, value]) => {
    const row = document.createElement('div');
    row.className = 'result-row';
    row.innerHTML = `<span class="result-label">${label}</span><span class="result-value">${value}</span>`;
    body.appendChild(row);
  });

  if (t.notes) {
    const notes = document.createElement('div');
    notes.className = 'result-notes';
    notes.textContent = t.notes;
    body.appendChild(notes);
  }

  card.appendChild(header);
  card.appendChild(body);
  return card;
}

function doSearch(query) {
  const q = query.trim().toLowerCase();
  resultsList.innerHTML = '';

  if (!q) {
    hint.style.display = 'block';
    noResults.style.display = 'none';
    matchCount.textContent = '';
    return;
  }

  hint.style.display = 'none';

  const matches = TECHNIQUES.filter(t =>
    t.name.toLowerCase().includes(q)
  );

  if (matches.length === 0) {
    noResults.style.display = 'block';
    matchCount.textContent = '';
    return;
  }

  noResults.style.display = 'none';
  matchCount.textContent = `${matches.length} result${matches.length !== 1 ? 's' : ''}`;
  matches.forEach(t => resultsList.appendChild(renderCard(t)));
}

let debounce;
input.addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(() => doSearch(input.value), 180);
});

clearBtn.addEventListener('click', () => {
  input.value = '';
  doSearch('');
  input.focus();
});

input.focus();
</script>
